<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CHAOS AWAKENED | Salar King</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Animated Background Canvas -->
    <canvas id="bgCanvas"></canvas>
    
    <!-- Overlay Gradient for Depth -->
    <div class="overlay-gradient"></div>
    
    <!-- Popup Modal -->
    <div id="welcomeModal" class="modal">
        <div class="modal-content">
            <div class="modal-glow"></div>
            <div class="chaos-symbol">🌌</div>
            <p class="modal-message">Welcome, Chaos Awakened!</p>
            <p class="modal-sub">This site was made by <span class="highlight">Salar King</span> 👑</p>
            <button id="enterBtn" class="enter-button">
                <span class="btn-text">Enter The Site</span>
                <span class="btn-glow"></span>
            </button>
        </div>
    </div>
    
    <!-- Main Content (Initially Hidden) -->
    <main id="mainContent" class="main-content hidden">
        <div class="glass-card">
            <div class="card-inner">
                <div class="accent-line"></div>
                <h1 class="card-title">[ TITLE PLACEHOLDER ]</h1>
                <div class="card-divider"></div>
                <p class="card-text">
                    [ CONTENT PLACEHOLDER ]<br><br>
                    Your text will appear here. This space is reserved for your message.
                </p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
      </html>
